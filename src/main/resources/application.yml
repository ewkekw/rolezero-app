server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 200

spring:
  application:
    name: role0-core-api

  # Java 21 Virtual Threads para alta concorrência O(1)
  threads:
    virtual:
      enabled: true

  # Banco de Dados Geoespacial (Supabase IPv4 / Session Pooler)
  datasource:
    url: jdbc:postgresql://${DB_HOST:aws-1-sa-east-1.pooler.supabase.com}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USER:postgres.dwiufcdrwhbuqrrvlfyb}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    locations: classpath:db/migration

  jpa:
    # PostgreSQLDialect auto-detectado pelo Hibernate 6 — remover deprecation warning
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  # Cache (Usando simple/in-memory, Redis desativado via Application.java)
  cache:
    type: "${CACHE_TYPE:simple}"

  # Mensageria / EDA (RabbitMQ opcional)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  rabbitmq:
    host: "${RABBITMQ_HOST:localhost}"
    port: "${RABBITMQ_PORT:5672}"
    username: "${RABBITMQ_USER:guest}"
    password: "${RABBITMQ_PASS:guest}"

# Segurança Customizada
app:
  security:
    jwt:
      secret: "${JWT_SECRET:3f8e589A!2e5B876aD*74A4b1c2D3e4F5g6h7i8j9K0}"
      expiration-ms: 86400000
  integrations:
    openweather:
      api-key: "${OPENWEATHER_API_KEY:dummy_key}"
      base-url: "https://api.openweathermap.org/data/2.5"
    nominatim:
      base-url: "${NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}"
      user-agent: "${NOMINATIM_USER_AGENT:Role0-Backend/1.0 (contact@role0.com)}"
